{{- if .Values.ingress.historyServer.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "spark-connect.fullname" . }}-history-server
  labels:
    {{- include "spark-connect.labels" . | nindent 4 }}
  {{- with .Values.ingress.historyServer.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.historyServer.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.historyServer.tls }}
  tls:
    {{- range .Values.ingress.historyServer.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.historyServer.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "spark-connect.fullname" $ }}-history-server
                port:
                  name: spark-history
          {{- end }}
    {{- end }}
{{- end }}
